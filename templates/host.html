<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Offline - PANTALLA PRINCIPAL</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; padding: 20px; text-align: center; }
        .contenedor-host { max-width: 900px; margin: 0 auto; }
        .header-host { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 15px 30px; border-radius: 12px; margin-bottom: 20px; gap: 15px; }
        
        /* Estilo del Reloj Timer Flotante para el Anfitrión */
        .timer-host-badge { font-size: 24px; font-weight: bold; color: #ffeb3b; background: #111; padding: 8px 18px; border-radius: 8px; min-width: 90px; border: 1px solid #444; transition: color 0.3s; }
        
        /* Panel de Preguntas */
        .panel-pregunta { background: #1e1e1e; border: 2px solid #444; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        .enunciado { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: #ffeb3b; }
        .opciones-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opcion-caja { padding: 15px; font-size: 20px; font-weight: bold; border-radius: 8px; color: white; text-align: left; }
        .red { background-color: #e21b3c; }
        .blue { background-color: #1368ce; }
        .panel-correcta { margin-top: 15px; font-size: 22px; color: #4CAF50; font-weight: bold; background: #1c351e; padding: 10px; border-radius: 8px; display: none; }

        /* Tabla de Clasificación */
        .tabla-ranking { width: 100%; border-collapse: collapse; margin-top: 15px; background: #222; border-radius: 10px; overflow: hidden; }
        .tabla-ranking th, .tabla-ranking td { padding: 12px 15px; text-align: center; font-size: 18px; }
        .tabla-ranking th { background-color: #333; color: #00fa9a; }
        .tabla-ranking tr:nth-child(even) { background-color: #2a2a2a; }
        .tabla-ranking tr:hover { background-color: #353535; }
        .oro { color: #ffd700; font-weight: bold; }

        /* Botones de Control */
        .btn-control { background-color: #ff9800; color: black; padding: 12px 25px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; }
        .btn-control:hover { background-color: #e68a00; }
        
        /* NUEVO: Clase especial para el botón de Iniciar */
        .btn-iniciar { background-color: #4CAF50; color: white; }
        .btn-iniciar:hover { background-color: #3e8e41; }
    </style>
</head>
<body>

    <div class="contenedor-host">
        <div class="header-host">
            <div style="display: flex; gap: 15px; align-items: center;">
                <img src="/static/logo.jpg" alt="Logo ESFA" style="height: 75px; width: auto; border-radius: 5px;">
                <img src="/static/unrn.png" alt="Logo UNRN" style="height: 70px; width: auto; border-radius: 5px;">
            </div>
            <h2>🖥️ PANEL HOST <span id="contador-preguntas" style="color: #00fa9a;">(Lobby)</span></h2>
            
            <div id="timer-host" class="timer-host-badge">⏱️ 10s</div>
            
            <button id="btn-accion-host" class="btn-control btn-iniciar" onclick="siguientePregunta()">🚀 INICIAR TRIVIA</button>
        </div>

        <div id="bloque-trivia" class="panel-pregunta">
            <div id="pregunta-texto" class="enunciado">Esperando a los/as participantes... Presioná "INICIAR TRIVIA" cuando estén listos.</div>
            <div id="contenedor-opciones" class="opciones-container">
                <div id="opcion-a-texto" class="opcion-caja red">▲ Opción A</div>
                <div id="opcion-b-texto" class="opcion-caja blue">■ Opción B</div>
            </div>
            <div id="respuesta-correcta-box" class="panel-correcta">
                ✅ RESPUESTA CORRECTA: <span id="letra-correcta"></span>
            </div>
        </div>

        <div id="ranking-seccion">
            <h3>🏆 TABLA DE POSICIONES (RANKING DE MAYOR A MENOR)</h3>
            <table class="tabla-ranking">
                <thead>
                    <tr>
                        <th style="width: 10%">Puesto</th>
                        <th style="width: 50%">Participante</th>
                        <th style="width: 20%">Puntaje</th>
                        <th style="width: 20%">Tiempo Usado (s)</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    <tr>
                        <td colspan="4" style="color: #aaa;">Esperando que se unan los/as participantes...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws/host`);
        let temporizadorHost;
        let tiempoRestanteHost = 10;
        let respuestaCorrectaActiva = ""; 

        ws.onmessage = (event) => {
            const datos = JSON.parse(event.data);
            
            if (datos.evento === "MOSTRAR_PREGUNTA") {
                const btnHost = document.getElementById("btn-accion-host");
                btnHost.innerText = "Siguiente Pregunta ➡️";
                btnHost.classList.remove("btn-iniciar"); 

                document.getElementById("contador-preguntas").innerText = `(${datos.numero_actual} / ${datos.total})`;
                document.getElementById("ranking-seccion").style.display = "none";
                
                document.getElementById("pregunta-texto").innerText = datos.enunciado;
                document.getElementById("opcion-a-texto").innerText = `▲ A: ${datos.opcion_a}`;
                document.getElementById("opcion-b-texto").innerText = `■ B: ${datos.opcion_b}`;
                document.getElementById("respuesta-correcta-box").style.display = "none";
                
                respuestaCorrectaActiva = datos.correcta;
                
                clearInterval(temporizadorHost);
                tiempoRestanteHost = 10;
                const displayHost = document.getElementById("timer-host");
                displayHost.innerText = `⏳ ${tiempoRestanteHost}s`;
                displayHost.style.color = "#ffeb3b";
                
                temporizadorHost = setInterval(() => {
                    tiempoRestanteHost--;
                    if (tiempoRestanteHost <= 0) {
                        clearInterval(temporizadorHost);
                        displayHost.innerText = "⏰ ¡FIN!";
                        displayHost.style.color = "#ff5555";
                        
                        if (respuestaCorrectaActiva) {
                            document.getElementById("letra-correcta").innerText = respuestaCorrectaActiva;
                            document.getElementById("respuesta-correcta-box").style.display = "block";
                        }
                    } else {
                        displayHost.innerText = `⏳ ${tiempoRestanteHost}s`;
                        if (tiempoRestanteHost <= 3) {
                            displayHost.style.color = "#ff3333";
                        }
                    }
                }, 1000);
            }
            
            if (datos.evento === "ACTUALIZAR_RANKING") {
                const tbody = document.getElementById("cuerpo-tabla");
                tbody.innerHTML = ""; 
                
                datos.ranking.forEach((jugador, indice) => {
                    let medalla = indice + 1;
                    if (medalla === 1) medalla = "🥇";
                    if (medalla === 2) medalla = "🥈";
                    if (medalla === 3) medalla = "🥉";
                    
                    tbody.innerHTML += `
                        <tr class="${indice === 0 ? 'oro' : ''}">
                            <td>${medalla}</td>
                            <td><b>${jugador.nombre}</b></td>
                            <td><span style="color: #00ff00">${jugador.puntos}</span> pts</td>
                            <td>${jugador.tiempo.toFixed(2)}s</td>
                        </tr>
                    `;
                });
            }

            if (datos.evento === "JUEGO_TERMINADO") {
                clearInterval(temporizadorHost);
                document.getElementById("timer-host").innerText = "🏁";
                document.getElementById("contador-preguntas").innerText = "(Finalizado)";
                
                document.getElementById("pregunta-texto").innerText = "🎉 ¡Taller Finalizado! Acá está el podio del CET N°11 🎉";
                document.getElementById("contenedor-opciones").style.display = "none";
                document.getElementById("respuesta-correcta-box").style.display = "none";
                
                document.getElementById("ranking-seccion").style.display = "block";
                
                const btn = document.getElementById("btn-accion-host");
                btn.disabled = true;
                btn.style.backgroundColor = "#444";
                btn.style.color = "#888";
                btn.style.cursor = "not-allowed";
                btn.innerText = "Finalizado 🔒";
            }
        };

        function siguientePregunta() {
            ws.send(JSON.stringify({ "accion": "SIGUIENTE_PREGUNTA" }));
        }
    </script>
</body>
</html>
